name: "Build Get Wallet Android Apps"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_target:
        description: "Which app(s) to build"
        required: true
        default: "all"
        type: choice
        options: [all, user, admin]

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

jobs:
  build-user:
    name: "📱 Build User App (com.getwallet.app)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'user' || github.event_name == 'push' }}
    timeout-minutes: 45

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "☕ Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🤖 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "✅ Accept SDK licenses"
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: "🔧 Install SDK components"
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" || true
          sdkmanager --install "platform-tools" || true

      - name: "📦 Install dependencies"
        run: npm ci --legacy-peer-deps --no-audit --no-fund
        timeout-minutes: 10

      - name: "🗑️ Remove API routes"
        run: rm -rf src/app/api || true

      - name: "🏗️ Build Next.js (static export)"
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1

      - name: "🔄 Capacitor sync"
        run: npx cap sync android

      - name: "🔐 Setup signing"
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > get-wallet.keystore
            echo "USING_SECRET=true" >> $GITHUB_ENV
          else
            keytool -genkey -v \
              -keystore get-wallet.keystore \
              -alias getwallet \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass "GetWallet2026" \
              -keypass "GetWallet2026" \
              -dname "CN=Get Wallet, OU=Mobile, O=GetWallet, L=Aden, ST=Aden, C=YE"
            echo "USING_SECRET=false" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD || 'GetWallet2026' }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS || 'getwallet' }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD || 'GetWallet2026' }}" >> $GITHUB_ENV

      - name: "🔨 Build Release APK"
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../get-wallet.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD="${KEYSTORE_PASSWORD}" \
            -PMYAPP_UPLOAD_KEY_ALIAS="${KEY_ALIAS}" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="${KEY_PASSWORD}" \
            --stacktrace

      - name: "⬆️ Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: get-wallet-user-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-admin:
    name: "🛡️ Build Admin App (com.getwallet.admin)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'admin' || github.event_name == 'push' }}
    timeout-minutes: 45

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "☕ Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🤖 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "✅ Accept SDK licenses"
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: "🔧 Install SDK components"
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" || true
          sdkmanager --install "platform-tools" || true

      - name: "📦 Install dependencies"
        working-directory: south-admin
        run: npm ci --legacy-peer-deps --no-audit --no-fund
        timeout-minutes: 10

      - name: "🗑️ Remove API routes"
        run: rm -rf south-admin/src/app/api || true

      - name: "🔧 Remove root lockfile"
        run: rm -f package-lock.json || true

      - name: "🏗️ Build Next.js (static export)"
        working-directory: south-admin
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1

      - name: "🔄 Capacitor sync"
        working-directory: south-admin
        run: npx cap sync android

      - name: "🔐 Setup signing"
        run: |
          if [ -n "${{ secrets.ADMIN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ADMIN_KEYSTORE_BASE64 }}" | base64 -d > get-wallet-admin.keystore
            echo "USING_SECRET=true" >> $GITHUB_ENV
          elif [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > get-wallet-admin.keystore
            echo "USING_SECRET=true" >> $GITHUB_ENV
          else
            keytool -genkey -v \
              -keystore get-wallet-admin.keystore \
              -alias getwalletadmin \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass "GetWalletAdmin2026" \
              -keypass "GetWalletAdmin2026" \
              -dname "CN=Get Wallet Admin, OU=Admin, O=GetWallet, L=Aden, ST=Aden, C=YE"
            echo "USING_SECRET=false" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PASSWORD=${{ secrets.ADMIN_KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD || 'GetWalletAdmin2026' }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.ADMIN_KEY_ALIAS || secrets.KEY_ALIAS || 'getwalletadmin' }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ADMIN_KEY_PASSWORD || secrets.KEY_PASSWORD || 'GetWalletAdmin2026' }}" >> $GITHUB_ENV

      - name: "🔨 Build Release APK"
        working-directory: south-admin/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../../get-wallet-admin.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD="${KEYSTORE_PASSWORD}" \
            -PMYAPP_UPLOAD_KEY_ALIAS="${KEY_ALIAS}" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="${KEY_PASSWORD}" \
            --stacktrace

      - name: "⬆️ Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: get-wallet-admin-release
          path: south-admin/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
